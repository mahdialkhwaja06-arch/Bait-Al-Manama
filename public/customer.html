header{padding:24px 20px 18px;text-align:center;}
.hdr-logo{width:200px;max-width:60vw;filter:brightness(0) invert(1) sepia(0.35) saturate(3) hue-rotate(3deg) brightness(0.97);opacity:0.92;}
.callout-wrap{display:flex;justify-content:center;margin:0 20px 20px;position:relative;z-index:100;}
.callout-btn{background:#ff6b35;color:white;border:none;padding:14px 28px;border-radius:18px;font-size:16px;font-weight:800;cursor:pointer;width:100%;max-width:400px;box-shadow:0 6px 20px rgba(255,107,53,0.4);}
.callout-dropdown{position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#fff4df;border-radius:18px;padding:16px;z-index:500;display:none;box-shadow:0 10px 30px rgba(0,0,0,0.5);min-width:280px;color:#1c120b;}
.callout-dropdown.open{display:block;}
.callout-dropdown h3{font-size:16px;margin-bottom:12px;text-align:center;}
.callout-dropdown select{width:100%;padding:12px;border-radius:12px;border:none;background:#f1e8d9;font-size:16px;font-family:'Cairo',sans-serif;margin-bottom:12px;}
.callout-dropdown .callout-send-btn{width:100%;padding:12px;border:none;border-radius:12px;background:#1c120b;color:white;font-size:15px;font-weight:700;cursor:pointer;}
.home-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:18px;padding:20px;max-width:1200px;margin:auto;}
.section-card{background:rgba(255,255,255,0.08);backdrop-filter:blur(10px);border-radius:24px;overflow:hidden;cursor:pointer;transition:0.3s;border:1px solid rgba(255,255,255,0.06);position:relative;}
.section-card:hover{transform:translateY(-6px);}
.section-card img{width:100%;height:190px;object-fit:cover;}
.section-card-content{padding:18px;text-align:center;}
.section-card-content h2{color:#f3cf89;font-size:26px;}
.section-card.maintenance{pointer-events:auto;cursor:default;}
.section-card.maintenance:hover{transform:none;}
.maintenance-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.65);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
.maintenance-overlay .maint-icon{font-size:32px;}
.maintenance-overlay .maint-text{color:#ff8a65;font-size:16px;font-weight:800;}
.maintenance-overlay .maint-sub{color:#f5e2ba;font-size:13px;}
.page{display:none;padding:20px;}
.page.active{display:block;}
.back-btn{background:#f3cf89;color:#1c120b;border:none;padding:12px 18px;border-radius:14px;font-weight:700;margin-bottom:20px;cursor:pointer;}
.back-btn-bottom{background:#f3cf89;color:#1c120b;border:none;padding:12px 18px;border-radius:14px;font-weight:700;margin-top:30px;margin-bottom:20px;cursor:pointer;width:100%;font-size:16px;}
.section-title{text-align:center;margin-bottom:25px;}
.section-title h2{font-size:34px;color:#f3cf89;}
.menu-list-wrapper{background:rgba(255,255,255,0.08);border-radius:22px;overflow:hidden;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.06);}
.menu-list{display:flex;flex-direction:column;}
.menu-list-item{display:flex;align-items:center;gap:14px;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,0.07);transition:opacity 0.2s;}
.menu-list-item:last-child{border-bottom:none;}
.menu-list-item.disabled-row{opacity:0.45;pointer-events:none;}
.item-thumb{width:80px;height:80px;border-radius:14px;object-fit:cover;flex-shrink:0;background:#2a1a0e;}
video.item-thumb{width:80px;height:80px;border-radius:14px;object-fit:cover;flex-shrink:0;background:#2a1a0e;}
.menu-list-item-info{flex:1;min-width:0;}
.menu-list-item-info h3{font-size:15px;color:#fff1ca;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.menu-list-item-info .price{color:#f3cf89;font-size:13px;font-weight:700;}
.menu-list-item-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.menu-list-item-controls{display:flex;align-items:center;gap:8px;}
.menu-list-item-controls button{width:32px;height:32px;border:none;border-radius:10px;background:#f3cf89;color:#1c120b;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
.qty{font-size:18px;font-weight:700;min-width:20px;text-align:center;}
.out-of-stock-label{color:#ff8a65;font-size:11px;font-weight:700;background:rgba(255,138,101,0.15);border:1px solid rgba(255,138,101,0.3);border-radius:8px;padding:3px 8px;white-space:nowrap;}
.checkout-btn{position:fixed;bottom:18px;right:18px;background:#f3cf89;color:#1c120b;border:none;padding:16px 24px;border-radius:18px;font-size:16px;font-weight:800;cursor:pointer;z-index:998;box-shadow:0 10px 25px rgba(0,0,0,0.35);display:none;}
.checkout-btn.active{display:block;}
.order-popup{position:fixed;left:12px;right:12px;bottom:-700px;background:#fff4df;border-radius:24px;padding:16px;transition:0.35s;z-index:999;box-shadow:0 10px 30px rgba(0,0,0,0.4);color:#1c120b;max-height:80vh;overflow-y:auto;}
.order-popup.active{bottom:12px;}
.popup-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;}
.popup-header h2{font-size:24px;}
.close-btn{width:38px;height:38px;border:none;border-radius:12px;background:#1c120b;color:white;font-size:18px;cursor:pointer;}
.total{font-size:24px;font-weight:800;margin-bottom:12px;}
.order-inputs{display:flex;flex-direction:column;gap:10px;margin-bottom:12px;}
.order-inputs-row{display:flex;gap:10px;}
.order-inputs-row input,.order-inputs-row select{flex:1;padding:10px;border:none;border-radius:12px;background:#f1e8d9;font-size:14px;font-family:'Cairo',sans-serif;}
.order-inputs textarea{width:100%;height:60px;padding:10px;border:none;border-radius:12px;resize:none;background:#f1e8d9;font-size:14px;font-family:'Cairo',sans-serif;}
.input-error{border:2px solid #e53935 !important;}
.field-error{color:#e53935;font-size:12px;margin-top:-4px;}
.send-btn{width:100%;padding:14px;border:none;border-radius:14px;background:#1c120b;color:white;font-size:16px;font-weight:700;cursor:pointer;}
.send-btn:disabled{opacity:0.5;cursor:not-allowed;}
.success-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;justify-content:center;align-items:center;}
.success-overlay.active{display:flex;}
.success-box{background:#fff4df;border-radius:24px;padding:40px;text-align:center;color:#1c120b;max-width:340px;margin:20px;}
.success-box .checkmark{font-size:60px;margin-bottom:16px;}
.success-box h2{font-size:24px;margin-bottom:10px;}
.success-box p{font-size:15px;color:#5a4a3a;margin-bottom:20px;}
.success-box button{background:#1c120b;color:white;border:none;padding:14px 30px;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;}
footer{padding:50px 20px;text-align:center;}
footer h2{color:#f3cf89;font-size:32px;margin-bottom:10px;}
@media(max-width:768px){.order-inputs-row{flex-direction:column;}}
</style>
</head>

  hot:[["Red Tea",0.300],["Safron Tea",0.400],["Chi Karak",0.400],["Rose Tea",0.300],["Lemon Tea",0.400],["Safron Milk",0.500],["Milk & Tea",0.400],["Milk",0.400],["Hot COCO",0.800],["Khabeesa Milk",0.600],["Red Teapot",1.200],["Karak Pot",1.600],["Rose Teapot",1.200],["Coffee Pot",1.000]],
  cold:[["Black Lemon",0.700],["Iced Safron",0.700],["Rose Milk",0.600],["Kinza",0.200],["Iced Kinza",0.400],["Laban",0.500],["Water",0.100]]
};
var BUILTIN_IMAGES={
  starters:"https://www.inspiredtaste.net/wp-content/uploads/2019/03/How-to-Make-Homemade-Hummus-1200.jpg",
  main:"https://images.unsplash.com/photo-1544025162-d76694265947?q=80&w=1200",
  breads:"https://www.recipetineats.com/tachyon/2023/07/Arayes_2-close-up-square.jpg",
  sweets:"https://www.munatycooking.com/wp-content/uploads/2023/02/Khabeesa-5.jpg",
  hot:"https://media.springernature.com/m685/springer-static/image/art%3A10.1038%2Fs41407-019-0055-0/MediaObjects/41407_2019_55_Fig1_HTML.jpg",
  cold:"https://thefullest.com/cdn/shop/articles/THE_FULLEST_s_Saffron_Cold_Brew.webp"
};
var BUILTIN_LABELS={starters:'Starters',main:'Main Course',breads:'Breads',sweets:'Sweets',hot:'Hot Drinks',cold:'Cold Drinks'};

var menu = JSON.parse(JSON.stringify(defaultMenu));
var sectionLabels = Object.assign({},BUILTIN_LABELS);
var isVideoItems = {};
var orders = {};
var pageHistory = [];
var disabledItems = {};
var menuOverrides = {};
var deletedBuiltins = {};
var customSectionsData = [];
var sectionStatus = {};

/* ───── Rebuild menu ───── */
function rebuildMenu(customItems,overrideData){
  sectionLabels=Object.assign({},BUILTIN_LABELS);
  isVideoItems={};
  if(overrideData){
    if(typeof overrideData==='string'){try{overrideData=JSON.parse(overrideData);}catch(e){overrideData={};}}
    menuOverrides=overrideData.overrides||{};
    deletedBuiltins=overrideData.deleted||{};
  }
  for(var sec in defaultMenu){
    menu[sec]=[];
    defaultMenu[sec].forEach(function(item){
      var origName=item[0];
      if(deletedBuiltins[origName]) return;
      var ov=menuOverrides[origName];
      if(ov){
        menu[sec].push([ov.name,ov.price]);
        if(ov.image_url){images[ov.name]=ov.image_url; if(ov.is_video) isVideoItems[ov.name]=true;}
        else if(images[origName]) images[ov.name]=images[origName];
      } else {
        menu[sec].push([origName,item[1]]);
      }
    });
    if(customItems){
      customItems.forEach(function(ci){
        if(ci.section===sec){
          menu[sec].push([ci.name,ci.price]);
          if(ci.image_url){images[ci.name]=ci.image_url; if(ci.is_video) isVideoItems[ci.name]=true;}
        }
      });
    }
  }
  // Custom sections
  customSectionsData.forEach(function(cs){
    var secKey='csec_'+cs.id;
    menu[secKey]=[];
    sectionLabels[secKey]=cs.name;
    if(customItems){
      customItems.forEach(function(ci){
        if(ci.section===secKey){
          menu[secKey].push([ci.name,ci.price]);
          if(ci.image_url){images[ci.name]=ci.image_url; if(ci.is_video) isVideoItems[ci.name]=true;}
        }
      });
    }
  });
}

/* ───── Section visibility ───── */
function getSectionVisible(secId,isCustom){
  var val=sectionStatus[secId];
  if(isCustom){
    // Only show if explicitly turned on at least once
    return val===true ? 'active' : (val===false ? 'maintenance' : 'hidden');
  }
  if(val===false) return 'maintenance';
  return 'active';
}

/* ───── Build home grid ───── */
function buildHomeGrid(){
  var grid=document.getElementById('homeGrid');
  var html='';
  // Built-in sections
  var builtinOrder=['starters','main','breads','sweets','hot','cold'];
  builtinOrder.forEach(function(sec){
    var vis=getSectionVisible(sec,false);
    var isMaint=(vis==='maintenance');
    html+='<div class="section-card'+(isMaint?' maintenance':'')+'" '+(!isMaint?'onclick="openPage(\''+sec+'\')\"':'onclick="showMaintenance(\''+BUILTIN_LABELS[sec]+'\')"')+'>'+
      '<img src="'+BUILTIN_IMAGES[sec]+'" onerror="this.src=\'\'">'+
      '<div class="section-card-content"><h2>'+BUILTIN_LABELS[sec]+'</h2></div>'+
      (isMaint?'<div class="maintenance-overlay"><div class="maint-icon">&#128679;</div><div class="maint-text">Under Maintenance</div><div class="maint-sub">Coming back soon</div></div>':'')+
    '</div>';
  });
  // Custom sections
  customSectionsData.forEach(function(cs){
    var secKey='csec_'+cs.id;
    var vis=getSectionVisible(secKey,true);
    if(vis==='hidden') return;
    var isMaint=(vis==='maintenance');
    var imgSrc=cs.cover_image||'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?q=80&w=1200';
    html+='<div class="section-card'+(isMaint?' maintenance':'')+'" '+(!isMaint?'onclick="openPage(\''+secKey+'\')\"':'onclick="showMaintenance(\''+cs.name+'\')"')+'>'+
      '<img src="'+imgSrc+'" onerror="this.src=\'\'">'+
      '<div class="section-card-content"><h2>'+cs.name+'</h2></div>'+
      (isMaint?'<div class="maintenance-overlay"><div class="maint-icon">&#128679;</div><div class="maint-text">Under Maintenance</div><div class="maint-sub">Coming back soon</div></div>':'')+
    '</div>';
  });
  grid.innerHTML=html;
}

function showMaintenance(sectionName){
  alert('⚠️ ' + sectionName + ' is currently under maintenance.\nPlease check back soon!');
}

/* ───── Build menu pages ───── */
function buildMenuPages(){
  var menuPages=document.getElementById('menuPages');
  menuPages.innerHTML='';
  for(var sec in menu){
    (function(s){
      var page=document.createElement('div');
      page.className='page'; page.id='menupage_'+s;
      page.innerHTML=
        '<button class="back-btn" onclick="goBack()">&#8592; Back</button>'+
        '<div class="section-title"><h2>'+(sectionLabels[s]||s)+'</h2></div>'+
        '<div class="menu-list-wrapper"><div class="menu-list" id="custlist_'+s+'"></div></div>'+
        '<button class="back-btn-bottom" onclick="goBack()">&#8592; Back to Menu</button>';
      menuPages.appendChild(page);
      renderMenuList(page,s);
    })(sec);
  }
}

function renderMenuList(container,sec){
  var listDiv=container.querySelector('.menu-list');
  if(!listDiv||!menu[sec]) return;
  listDiv.innerHTML=menu[sec].map(function(item){
    var name=item[0]; var price=item[1];
    var disabled=!!disabledItems[name];
    var safeId='qty_'+name.replace(/[^a-zA-Z0-9]/g,'_');
    var qty=(orders[name]&&orders[name].qty)||0;
    var imgSrc=images[name]||'';
    var isVid=!!isVideoItems[name];
    var escapedName=name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    var thumbHtml=isVid
      ? '<video class="item-thumb" src="'+imgSrc+'" autoplay muted loop playsinline></video>'
      : '<img class="item-thumb" src="'+imgSrc+'" alt="'+name+'" loading="lazy" onerror="this.src=\'\'">';
    return '<div class="menu-list-item'+(disabled?' disabled-row':'')+'" >'+
      thumbHtml+
      '<div class="menu-list-item-info">'+
        '<h3>'+name+'</h3>'+
        '<div class="price">'+price.toFixed(3)+' BD</div>'+
      '</div>'+
      '<div class="menu-list-item-right">'+
        (disabled
          ? '<span class="out-of-stock-label">Out of Stock</span>'
          : '<div class="menu-list-item-controls">'+
              '<button onclick="changeQty(\''+escapedName+'\',-1,'+price+')">&#8722;</button>'+
              '<div class="qty" id="'+safeId+'">'+qty+'</div>'+
              '<button onclick="changeQty(\''+escapedName+'\',1,'+price+')">&#43;</button>'+
            '</div>'
        )+
      '</div>'+
    (isFlavorItem(name)?
      '<div style="padding:4px 12px 8px;display:flex;justify-content:flex-end;">'+
        '<button id="fpbtn_'+safeId+'" onclick="openFlavorPick(\''+escapedName+'\','+price+')" '+
        'style="display:none;padding:9px 22px;border:none;border-radius:12px;background:#f3cf89;color:#1c120b;font-size:14px;font-weight:700;cursor:pointer;">Pick Flavor</button>'+
      '</div>'
    :'')+
    '</div>';
  }).join('');
}

function refreshAllLists(){
  for(var s in menu){
    var pg=document.getElementById('menupage_'+s);
    if(pg) renderMenuList(pg,s);
  }
}

/* ───── Load all data ───── */
function loadAllData(){
  Promise.all([
    fetch('/api/custom-items').then(function(r){return r.json();}),
    fetch('/api/menu-overrides').then(function(r){return r.json();}),
    fetch('/api/disabled-items').then(function(r){return r.json();}),
    fetch('/api/custom-sections').then(function(r){return r.json();}),
    fetch('/api/section-status').then(function(r){return r.json();})
  ]).then(function(results){
    customSectionsData=results[3]||[];
    sectionStatus=results[4]||{};
    rebuildMenu(results[0],results[1]);
    disabledItems=results[2]||{};
    buildHomeGrid();
    buildMenuPages();
  }).catch(function(){
    buildHomeGrid();
    buildMenuPages();
  });
}

loadAllData();

// Poll for updates every 3 seconds
setInterval(function(){
  var t='?t='+Date.now();
  Promise.all([
    fetch('/api/custom-items'+t).then(function(r){return r.json();}),
    fetch('/api/menu-overrides'+t).then(function(r){return r.json();}),
    fetch('/api/disabled-items'+t).then(function(r){return r.json();}),
    fetch('/api/custom-sections'+t).then(function(r){return r.json();}),
    fetch('/api/section-status'+t).then(function(r){return r.json();})
  ]).then(function(results){
    customSectionsData=results[3]||[];
    sectionStatus=results[4]||{};
    rebuildMenu(results[0],results[1]);
    disabledItems=results[2]||{};
    buildHomeGrid();
    refreshAllLists();
  }).catch(function(){});
},4000);

/* ───── Navigation ───── */
function scrollTop(){window.scrollTo({top:0,behavior:'instant'});}
function openPage(id){
  var current=document.querySelector('.page.active');
  if(current) pageHistory.push(current.id);
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  var target=document.getElementById('menupage_'+id)||document.getElementById(id);
  if(target) target.classList.add('active');
  scrollTop();
  history.pushState({page:id},'','');
}
function goBack(){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  if(pageHistory.length>0){document.getElementById(pageHistory.pop()).classList.add('active');}
  else{document.getElementById('homePage').classList.add('active');}
  scrollTop();
}
function goHome(){
  pageHistory=[];
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.getElementById('homePage').classList.add('active');
  scrollTop();
}
window.addEventListener('popstate',function(){goBack();});

/* ───── Cart ───── */
function getQtyId(n){return 'qty_'+n.replace(/[^a-zA-Z0-9]/g,'_');}

/* ── Kinza Flavor System ── */
var FLAVOR_ITEMS_LIST = ['Kinza', 'Iced Kinza'];
var KINZA_FLAVORS = ['Cola','Pomegranate','Orange','Diet Cola','Diet Lemon','Lemon','Citrus','Diet Citrus','Blueberries'];
var flavorModalPending = null;
function isFlavorItem(n){ return FLAVOR_ITEMS_LIST.indexOf(n)!==-1; }
function getFlavorBaseQty(base){
  return KINZA_FLAVORS.reduce(function(s,f){ var k=base+' ('+f+')'; return s+((orders[k]&&orders[k].qty)||0); },0);
}
function pickFlavor(flavor){
  if(!flavorModalPending) return;
  var base=flavorModalPending.name;
  var qty=(orders[base]?orders[base].qty:0)||1;
  var price=flavorModalPending.price;
  delete orders[base];
  var key=base+' ('+flavor+')';
  if(!orders[key]) orders[key]={qty:0,price:price};
  orders[key].qty+=qty;
  var fpBtn=document.getElementById('fpbtn_'+getQtyId(base));
  if(fpBtn) fpBtn.style.display='none';
  var el=document.getElementById(getQtyId(base));
  if(el) el.innerText=getFlavorBaseQty(base);
  updateTotal();
  document.getElementById('flavorModal').style.display='none';
  flavorModalPending=null;
}
function openFlavorPick(name,price){
  var qty=((orders[name]?orders[name].qty:0));
  if(qty<=0) return;
  flavorModalPending={name:name,price:price,qty:qty};
  renderFlavorModal();
  document.getElementById('flavorModal').style.display='flex';
}

function renderFlavorModal(){
  var base=flavorModalPending?flavorModalPending.name:'';
  var box=document.getElementById('flavorModalBox');
  if(!box) return;
  box.innerHTML='<h2 style="font-size:19px;font-weight:800;margin-bottom:6px;color:#1c120b;">'+base+'</h2>'+
    '<p style="font-size:13px;color:#8a6a3a;margin-bottom:16px;">Pick a flavor</p>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">'+
    KINZA_FLAVORS.map(function(f){
      return '<button onclick="pickFlavor(\''+f+'\')" style="padding:12px 8px;border:none;border-radius:14px;background:#f3cf89;color:#1c120b;font-size:14px;font-weight:700;cursor:pointer;">'+f+'</button>';
    }).join('')+
    '</div>'+
    '<button onclick="document.getElementById(\'flavorModal\').style.display=\'none\';flavorModalPending=null;" style="width:100%;margin-top:14px;padding:11px;border:none;border-radius:14px;background:rgba(28,18,11,0.08);color:#5a4a3a;font-size:14px;cursor:pointer;">Cancel</button>';
}
function changeQty(name,change,price){
  if(disabledItems[name]) return;
  if(isFlavorItem(name)){
    if(!orders[name]) orders[name]={qty:0,price:price};
    orders[name].qty+=change;
    if(orders[name].qty<0) orders[name].qty=0;
    if(orders[name].qty===0) delete orders[name];
    var dispEl=document.getElementById(getQtyId(name));
    var newQty=(orders[name]?orders[name].qty:0)+getFlavorBaseQty(name);
    if(dispEl) dispEl.innerText=newQty;
    var fpBtn=document.getElementById('fpbtn_'+getQtyId(name));
    if(fpBtn) fpBtn.style.display=(orders[name]&&orders[name].qty>0)?'inline-block':'none';
    updateTotal();
    return;
  }
  if(!orders[name]){orders[name]={qty:0,price:price};}
  orders[name].qty+=change;
  if(orders[name].qty<0) orders[name].qty=0;
  var el=document.getElementById(getQtyId(name));
  if(el) el.innerText=orders[name].qty;
  updateTotal();
}
function updateTotal(){
  var total=0;
  for(var item in orders) total+=orders[item].qty*orders[item].price;
  document.getElementById('total').innerText=total.toFixed(3);
  var btn=document.getElementById('checkoutBtn');
  if(total>0) btn.classList.add('active'); else{btn.classList.remove('active');closeCheckout();}
}
function openCheckout(){
  var html='';
  for(var item in orders){
    if(orders[item].qty>0){
      html+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #e8dcc8;">'+
        '<span>'+item+' x'+orders[item].qty+'</span>'+
        '<span style="font-weight:700;">'+(orders[item].qty*orders[item].price).toFixed(3)+' BD</span></div>';
    }
  }
  document.getElementById('orderItemsList').innerHTML=html;
  document.getElementById('orderPopup').classList.add('active');
}
function closeCheckout(){document.getElementById('orderPopup').classList.remove('active');}
function validateForm(){
  var table=document.getElementById('tableNumber').value;
  if(!table){
    var sel=document.getElementById('tableNumber');
    sel.style.border='2px solid #e53935';
    setTimeout(function(){sel.style.border='';},2000);
    return false;
  }
  return true;
}
function sendOrder(){
  if(!validateForm()) return;
  var table=document.getElementById('tableNumber').value||'N/A';
  var notes=document.getElementById('notes').value.trim();
  var total=0; var itemsList=[];
  for(var item in orders){
    if(orders[item].qty>0){
      total+=orders[item].qty*orders[item].price;
      itemsList.push({name:item,qty:orders[item].qty,price:orders[item].price});
    }
  }
  if(!itemsList.length) return;
  var btn=document.getElementById('sendBtn');
  btn.disabled=true; btn.innerText='Sending...';
  fetch('/api/orders',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({customerName:'Guest',tableNumber:table,items:itemsList,total:total,notes:notes})})
  .then(function(r){if(!r.ok)throw new Error('Failed');return r.json();})
  .then(function(){resetOrder();document.getElementById('successOverlay').classList.add('active');})
  .catch(function(e){alert('Error: '+e.message);})
  .finally(function(){btn.disabled=false;btn.innerText='Send Order';});
}
function resetOrder(){
  for(var item in orders) orders[item].qty=0;
  document.querySelectorAll('.qty').forEach(function(el){el.innerText='0';});
  document.getElementById('tableNumber').value='';
  document.getElementById('notes').value='';
  closeCheckout();
  document.getElementById('checkoutBtn').classList.remove('active');
  document.getElementById('total').innerText='0.000';
}
function closeSuccess(){document.getElementById('successOverlay').classList.remove('active');goHome();}

/* ───── Callout ───── */
function toggleCallout(){document.getElementById('calloutDropdown').classList.toggle('open');}
document.addEventListener('click',function(e){
  var wrap=document.querySelector('.callout-wrap');
  if(wrap&&!wrap.contains(e.target)) document.getElementById('calloutDropdown').classList.remove('open');
});
function sendCallout(){
  var t=document.getElementById('calloutTable').value;
  if(!t){alert('Please select your table number.');return;}
  fetch('/api/callouts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tableNumber:t})})
  .then(function(){
    document.getElementById('calloutDropdown').classList.remove('open');
    document.getElementById('calloutTable').value='';
    alert('Staff notified! They will come to Table '+t+' shortly. \uD83D\uDD14');
  })
  .catch(function(){alert('Could not send callout. Please try again.');});
}
